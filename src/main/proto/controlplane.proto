syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.algocd.controlplane.grpc";
option java_outer_classname = "ProtoAlgocd";

package com.algocd.controlplane.grpc;

service ControlPlane {
    // Join a terminal using a bootstrap token.
    // This is the first step for a new terminal to register with the control plane.
    rpc Join(JoinRequest) returns (JoinResponse);
}

message JoinRequest {
    // The unique bootstrap token generated during terminal creation in the webportal.
    string bootstrap_token = 1;
}

message JoinResponse {
    // The UUID of the terminal.
    string terminal_id = 1;
}