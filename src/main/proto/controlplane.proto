syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.algocd.controlplane.grpc";
option java_outer_classname = "AlgocdApi";

package com.algocd.controlplane.grpc;

service ControlPlane {
  // The client (MT5) connects here and waits for server instructions.
  rpc EstablishStream(stream CommandResponse) returns (stream CommandRequest);
}

// --- Wrapper for Server-to-Client Requests ---

message CommandRequest {
  string command_id = 1; // Traceability for async responses

  oneof payload {
    // Engine Commands
    PingRequest ping = 3;
    StartAlgoRequest start_algo = 4;
    StopAlgoRequest stop_algo = 5;
    SymbolRequest get_symbol = 6;
    GetAllSymbolsRequest get_all_symbols = 7;
    PullArtifactRequest pull_artifact = 8;
    ListArtifactsRequest list_artifacts = 9;
    DeleteArtifactRequest delete_artifact = 10;
    InspectArtifactRequest inspect_artifact = 11;
    DeployExpertRequest deploy_expert = 12;
    RedeployExpertRequest redeploy_expert = 13;
    UndeployExpertRequest undeploy_expert = 14;
    ListExpertsRequest list_experts = 15;
    InspectExpertRequest inspect_expert = 16;
    GetTerminalInfoRequest get_terminal_info = 17;
    StreamLogsRequest stream_logs = 18;

    // Trade Commands (The ones you just added)
    Empty get_active_positions = 19;
    Empty stream_positions_trigger = 20; // Server tells client "start streaming positions"
    Empty get_active_orders = 21;
    Empty stream_orders_trigger = 22;    // Server tells client "start streaming orders"
    HistoryRequest get_history_deals = 23;
    HistoryRequest get_history_orders = 24;
  }
}

// --- Wrapper for Client-to-Server Responses ---

message CommandResponse {
  string command_id = 1;
  bool success = 3;
  string error_message = 4;

  oneof payload {
    // Engine Responses
    PingResponse ping = 5;
    TradeResponse trade_status = 6;
    SymbolResponse symbol = 7;
    GetAllSymbolsResponse all_symbols = 8;
    PullArtifactResponse pull_artifact = 9;
    ListArtifactsResponse list_artifacts = 10;
    DeleteArtifactResponse delete_artifact = 11;
    InspectArtifactResponse inspect_artifact = 12;
    DeployExpertResponse deploy_expert = 13;
    RedeployExpertResponse redeploy_expert = 14;
    UndeployExpertResponse undeploy_expert = 15;
    ListExpertsResponse list_experts = 16;
    InspectExpertResponse inspect_expert = 17;
    GetTerminalInfoResponse terminal_info = 18;
    StreamLogsResponse logs_chunk = 19;

    // Trade Responses
    PositionList positions = 20;
    OrderList orders = 21;
    DealList deals = 22;
  }
}

// --- Data Structures (Original Logic) ---

message Position {
  uint64 ticket = 1;
  string symbol = 2;
  double volume = 3;
  double price_open = 4;
  double price_current = 5;
  double profit = 6;
  int64 magic = 7;
  int32 type = 8;
  double swap = 9;
  double sl = 10;
  double tp = 11;
  int32 reason = 12;
  string comment = 13;
  int64 time_msc = 14;
  int64 time_update_msc = 15;
  string external_id = 16;
}

message Order {
  uint64 ticket = 1;
  string symbol = 2;
  double volume_initial = 3;
  double volume_current = 4;
  double price_open = 5;
  int32 state = 6;
  int32 type = 7;
  uint64 position_id = 8;
  int64 magic = 9;
  int32 reason = 10;
  string comment = 11;
  string external_id = 12;
  int64 time_setup_msc = 13;
  int64 time_done_msc = 14;
  int64 time_expiration = 15;
  double sl = 16;
  double tp = 17;
  double price_stoplimit = 18;
}

message Deal {
  uint64 ticket = 1;
  uint64 order_id = 2;
  uint64 position_id = 3;
  string symbol = 4;
  double volume = 5;
  double price = 6;
  double profit = 7;
  double commission = 8;
  double swap = 9;
  int64 time = 10;
  int64 magic = 11;
  int32 reason = 12;
  string comment = 13;
  string external_id = 14;
  int64 time_msc = 15;
  int32 type = 16;
  int32 entry = 17;
}

message HistoryRequest {
  int64 from_timestamp = 1;
  int64 to_timestamp = 2;
  optional uint64 position_id = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message PositionList { repeated Position positions = 1; }
message OrderList { repeated Order orders = 1; }
message DealList { repeated Deal deals = 1; }
message Empty {}


message StreamLogsRequest {
  int32 lines = 1;
  bool follow = 2;
}

message StreamLogsResponse {
  bytes chunk = 1;
}


message ListExpertsRequest {}

message DeployedExpertSummary {
  string id = 1;
  string reference = 2;
  string symbol = 3;
  string timeframe = 4;
  string status = 5;
  string created_at = 6;
  string last_updated_at = 7;
}

message ListExpertsResponse {
  repeated DeployedExpertSummary experts = 1;
}

message InspectExpertRequest {
  string id = 1;
}

message InspectExpertResponse {
  bool success = 1;
  ExpertDetails expert = 2;
  string error_message = 3;
}

message ExpertDetails {
  string id = 1;
  string symbol = 2;
  string timeframe = 3;
  int64 chart_id = 4;
  string image_id = 5;
  string path = 6;
  string template_path = 7;
  string status = 8;
  string created_at = 9;
  string last_updated_at = 10;
  map<string, Parameter> parameters = 11;
}

message PingRequest {}
message PingResponse {
  string message = 1;
}

message StartAlgoRequest {}
message StopAlgoRequest {}

message TradeResponse {
  bool success = 1;
}

message GetAllSymbolsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message GetAllSymbolsResponse {
  repeated SymbolSummary symbols = 1;
  int32 total = 2;
}

message SymbolSummary {
  string symbol = 1;
  string description = 2;
  int32 digits = 3;
  double tick_size = 4;
  double contract_size = 5;
  string currency_profit = 6;
  SwapInfo swaps = 7;
}

message SymbolRequest {
  string symbol = 1;
}

message SymbolResponse {
  string symbol = 1;
  string description = 2;
  int32 digits = 3;
  double point = 4;
  TickInfo tick = 5;
  ContractInfo contract = 6;
  VolumeInfo volume = 7;
  TradingInfo trading = 8;
  SwapInfo swaps = 9;
  MarginInfo margin = 10;
}

message TickInfo {
  double size = 1;
  double value = 2;
  double value_profit = 3;
  double value_loss = 4;
}

message ContractInfo {
  double size = 1;
  string currency_base = 2;
  string currency_profit = 3;
  string currency_margin = 4;
}

message VolumeInfo {
  double min = 1;
  double max = 2;
  double step = 3;
  double limit = 4;
}

message TradingInfo {
  string mode = 1;
  string execution = 2;
  int32 stops_level = 3;
  int32 freeze_level = 4;
}

message SwapInfo {
  string mode = 1;
  double long = 2;
  double short = 3;
  string rollover_day = 4;
}

message MarginInfo {
  double initial = 1;
  double maintenance = 2;
}

message PullArtifactRequest {
  string reference = 1;
}

message PullArtifactResponse {
  bool success = 1;
  repeated string updated_files = 2;
  repeated string skipped_files = 3;
  double operation_time_ms = 4;
  string error_message = 5;
}

message ListArtifactsRequest {}

message ArtifactSummary {
  string name = 1;
  string category = 2;
  string artifact_type = 3;
  string digest = 4;
  uint64 size = 5;
  optional string created_at = 6;
}

message ListArtifactsResponse {
  repeated ArtifactSummary artifacts = 1;
}

message DeleteArtifactRequest {
  string reference = 1;
}

message DeleteArtifactResponse {
  bool success = 1;
  string error_message = 2;
}

message InspectArtifactRequest {
  string reference = 1;
}

message InspectArtifactResponse {
  bool success = 1;
  ArtifactDetails artifact = 2;
  string error_message = 3;
}

message DeployExpertRequest {
  string reference = 1;
  map<string, string> parameters = 2;
  string symbol = 3;
  string timeframe = 4;
}

message DeployExpertResponse {
  bool success = 1;
  string id = 2;
  string error_message = 3;
}

message RedeployExpertRequest {
  string id = 1;
}

message RedeployExpertResponse {
  bool success = 1;
  string id = 2;
  string error_message = 3;
}

message UndeployExpertRequest {
  string id = 1;
}

message UndeployExpertResponse {
  bool success = 1;
  string error_message = 2;
}

message ArtifactDetails {
  string reference = 1;
  string digest = 2;
  string artifact_type = 3;
  uint64 size = 4;
  optional string created_at = 5;
  ArtifactConfig config = 6;
  repeated LayerInfo layers = 7;
}

message LayerInfo {
  string media_type = 1;
  string digest = 2;
  uint64 size = 3;
  string title = 4;
}

message ArtifactConfig {
  string kind = 1;
  string version = 2;
  ArtifactMetadata metadata = 3;
  map<string, Parameter> parameters = 4;
}

message ArtifactMetadata {
  string id = 1;
  string name = 2;
  string artifact = 3;
}

message Parameter {
  string type = 1;
  string value = 2;
}

message GetTerminalInfoRequest {}

message GetTerminalInfoResponse {
  TerminalBase terminal = 1;
  TerminalCapabilities capabilities = 2;
  AccountBase account = 3;
  FinancialInfo financial = 4;
  HardwareInfo hardware = 5;
  MqlInfo mql = 6;
  ScreenInfo screen = 7;
}

message TerminalBase {
  string name = 1;
  string company = 2;
  int32 build = 3;
  string language = 4;
  string path = 5;
  string data_path = 6;
  string common_data_path = 7;
  bool connected = 8;
  int32 ping = 9;
  int32 codepage = 10;
  int32 max_bars = 11;
}

message TerminalCapabilities {
  bool dlls_allowed = 1;
  bool trade_allowed = 2;
  bool email_enabled = 3;
  bool ftp_enabled = 4;
  bool notifications_enabled = 5;
  bool opencl_support = 6;
  bool community_account = 7;
  bool community_connection = 8;
}

message AccountBase {
  int64 login = 1;
  string name = 2;
  string server = 3;
  string currency = 4;
  string company = 5;
  int32 leverage = 6;
  string trade_mode = 7;
  string margin_mode = 8;
  int32 limit_orders = 9;
  bool fifo_close = 10;
  bool hedge_allowed = 11;
  bool trade_allowed_account = 12;
  bool trade_expert = 13;
}

message FinancialInfo {
  double balance = 1;
  double equity = 2;
  double profit = 3;
  double credit = 4;
  double margin = 5;
  double margin_free = 6;
  double margin_level = 7;
  double margin_so_call = 8;
  double margin_so_so = 9;
}

message HardwareInfo {
  int32 cpu_cores = 1;
  int64 disk_space = 2;
  int64 memory_physical = 3;
  int64 memory_total = 4;
  int64 memory_available = 5;
  int64 memory_used = 6;
}

message MqlInfo {
  int64 memory_used = 1;
  int64 memory_limit = 2;
}

message ScreenInfo {
  int32 width = 1;
  int32 height = 2;
  int32 dpi = 3;
  int32 left = 4;
  int32 top = 5;
}
