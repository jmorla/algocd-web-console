server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: webportal
  threads:
    virtual:
      enabled: true

  thymeleaf:
    cache: false
  web:
    resources:
      cache:
        period: 0

  devtools:
    livereload:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/algocddb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: WebportalHikariPool
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      idle-timeout: 600000
      connection-timeout: 30000
      max-lifetime: 1800000

mybatis:
  type-handlers-package: com.algocd.webportal.config
  configuration:
    map-underscore-to-camel-case: true

algocd:
  terminal:
    heartbeat:
      interval: 5s
      ttl: 30s

