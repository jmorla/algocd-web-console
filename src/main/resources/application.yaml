server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: webportal
  threads:
    virtual:
      enabled: true

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: true

  thymeleaf:
    cache: false
  web:
    resources:
      cache:
        period: 0

  devtools:
    livereload:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/algocddb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: WebportalHikariPool
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      idle-timeout: 600000
      connection-timeout: 30000
      max-lifetime: 1800000

mybatis:
  type-handlers-package: com.algocd.webportal.config
  configuration:
    map-underscore-to-camel-case: true

algocd:
  registry:
    host: ${REGISTRY_HOST:localhost}
    port: ${REGISTRY_PORT:5000}
    username: ${REGISTRY_USERNAME:}
    password: ${REGISTRY_PASSWORD:}
    tls-enabled: ${REGISTRY_TLS_ENABLED:false}
  app:
    credentials:
      private-key-path: ${APP_PRIVATE_KEY_PATH:}
      certificate-path: ${APP_CERTIFICATE_PATH:}
      ca-certificate-path: ${APP_CA_CERTIFICATE_PATH:}
  terminal:
    heartbeat:
      interval: 5s
      ttl: 30s
  storage:
    upload-dir: ${STORAGE_UPLOAD_DIR:/tmp/algocd-uploads}

