server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: webportal
  threads:
    virtual:
      enabled: true

  thymeleaf:
    cache: false
  web:
    resources:
      cache:
        period: 0

  devtools:
    livereload:
      enabled: true
#    restart:
#      additional-paths: src/main/resources

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/algocddb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: WebportalHikariPool
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      idle-timeout: 600000
      connection-timeout: 30000
      max-lifetime: 1800000

mybatis:
  type-handlers-package: com.algocd.webportal.config
  configuration:
    map-underscore-to-camel-case: true

kubernetes:
  master-url: ${KUBERNETES_MASTER_URL:}
  namespace: ${KUBERNETES_NAMESPACE:}
  username: ${KUBERNETES_USERNAME:}
  password: ${KUBERNETES_PASSWORD:}
  token: ${KUBERNETES_TOKEN:}
  ca-cert-data: ${KUBERNETES_CA_CERT_DATA:}
  client-cert-data: ${KUBERNETES_CLIENT_CERT_DATA:}
  client-key-data: ${KUBERNETES_CLIENT_KEY_DATA:}
