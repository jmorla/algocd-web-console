databaseChangeLog:
  - changeSet:
      id: 20260425190000-create-terminals-and-locations
      author: system
      changes:
        - createTable:
            tableName: plans
            columns:
              - column:
                  name: plan_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: cpu_cores
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: ram_gb
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: monthly_price
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: hourly_price
                  type: DECIMAL(10,5)
                  constraints:
                    nullable: false
              - column:
                  name: expert_limit
                  type: INT
                  constraints:
                    nullable: false

        - createTable:
            tableName: locations
            columns:
              - column:
                  name: location_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: region
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true

        - createTable:
            tableName: terminals
            columns:
              - column:
                  name: terminal_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_terminal_user
                    referencedTableName: users
                    referencedColumnNames: user_id
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: plan_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_terminal_plan
                    referencedTableName: plans
                    referencedColumnNames: plan_id
              - column:
                  name: location_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_terminal_location
                    referencedTableName: locations
                    referencedColumnNames: location_id
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: PROVISIONING
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
