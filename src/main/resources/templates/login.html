<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{login.title}">AlgoCD - Login</title>
    <link rel="stylesheet" href="/dist/main.css" />
  </head>
  <body class="bg-[#F8FAFC] font-sans text-[#1E293B]">
    <div class="min-h-screen flex flex-col items-center justify-center p-6">
      <!-- Logo -->
      <div class="flex items-center gap-3 mb-10">
        <i data-lucide="bot" class="w-10 h-10 text-[#2563EB]"></i>
        <span class="text-3xl font-bold tracking-tight text-[#1E293B]">AlgoCD</span>
      </div>

      <!-- Login Card -->
      <div class="w-full max-w-[480px] bg-white rounded-2xl border border-slate-200 shadow-xl shadow-slate-200/50 p-8">
        <div class="mb-8">
          <h1 class="text-2xl font-bold text-[#1E293B]" th:text="#{login.card.title}">Sign in</h1>
          <p class="text-slate-500 mt-1" th:text="#{login.card.subtitle}">Enter your credentials to access your account</p>
        </div>

        <!-- Alert Messages -->
        <div th:if="${param.error}" class="mb-6 p-4 rounded-xl bg-red-50 border border-red-100 text-red-600 text-[13px] font-semibold flex items-center gap-2">
          <i data-lucide="alert-circle" class="w-4 h-4"></i>
          <span th:text="#{login.alert.error}">Invalid username/email or password.</span>
        </div>
        <div th:if="${param.logout}" class="mb-6 p-4 rounded-xl bg-green-50 border border-green-100 text-green-600 text-[13px] font-semibold flex items-center gap-2">
          <i data-lucide="check-circle" class="w-4 h-4"></i>
          <span th:text="#{login.alert.logout}">Successfully logged out.</span>
        </div>

        <form th:action="@{/login}" method="post" class="space-y-5">
          <div>
            <label for="username" class="block text-sm font-semibold text-slate-700 mb-2" th:text="#{login.form.label.username}">Username or email address</label>
            <div class="relative">
              <input type="text" id="username" name="username" required th:placeholder="#{login.form.placeholder.username}"
                th:classappend="${param.error} ? 'border-red-500 focus:ring-red-500/20 focus:border-red-500' : 'border-slate-200 focus:ring-[#2563EB]/20 focus:border-[#2563EB]'"
                class="w-full px-4 py-2.5 rounded-lg border focus:outline-none transition-all placeholder:text-slate-400">
              <div th:if="${param.error}" class="absolute inset-y-0 right-0 pr-3.5 flex items-center pointer-events-none">
                <i data-lucide="alert-circle" class="w-5 h-5 text-red-500"></i>
              </div>
            </div>
          </div>

          <div>
            <div class="flex items-center justify-between mb-2">
              <label for="password" class="block text-sm font-semibold text-slate-700" th:text="#{login.form.label.password}">Password</label>
              <a href="#" class="text-sm font-semibold text-[#2563EB] hover:underline" th:text="#{login.form.link.forgot}">Forgot password?</a>
            </div>
            <div class="relative">
              <input type="password" id="password" name="password" required placeholder="••••••••" 
                th:classappend="${param.error} ? 'border-red-500 focus:ring-red-500/20 focus:border-red-500' : 'border-slate-200 focus:ring-[#2563EB]/20 focus:border-[#2563EB]'"
                class="w-full px-4 py-2.5 rounded-lg border focus:outline-none transition-all placeholder:text-slate-400">
              <div th:if="${param.error}" class="absolute inset-y-0 right-0 pr-3.5 flex items-center pointer-events-none">
                <i data-lucide="alert-circle" class="w-5 h-5 text-red-500"></i>
              </div>
            </div>
          </div>

          <button type="submit" class="w-full bg-[#2563EB] text-white py-3 rounded-lg font-bold shadow-lg shadow-blue-200 hover:bg-[#1D4ED8] transition-all active:scale-[0.98]" th:text="#{login.form.button.signin}">
            Sign in
          </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
          <p class="text-sm text-slate-500">
            <span th:text="#{login.footer.noaccount}">Don't have an account?</span>
            <a th:href="@{/signup}" class="font-bold text-[#2563EB] hover:underline" th:text="#{login.footer.createaccount}">Create an account</a>
          </p>
        </div>
      </div>

      <!-- Footer Info -->
      <p class="mt-8 text-sm text-slate-400" th:text="#{common.footer.copyright}">
        &copy; 2026 AlgoCD Platform. All rights reserved.
      </p>
    </div>
    <script type="module" src="/dist/main.js"></script>
  </body>
</html>
