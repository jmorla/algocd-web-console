<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="terminalCreateForm">
    <div class="p-6">
        <h3 class="text-xl font-bold text-slate-800 mb-4" th:text="#{terminal.create.title}">Create New Terminal</h3>
        <p class="text-sm text-slate-500 mb-6" th:text="#{terminal.create.subtitle}">Enter the details for your new cloud terminal instance.</p>

        <form hx-post="/terminals" hx-target="#modal-content" hx-swap="innerHTML" class="space-y-4"
              th:object="${createTerminalRequest}"
              x-data="{ 
                selectedTags: [], 
                customKey: '',
                customValue: '',
                addTag(key, value) {
                    key = key.trim();
                    value = value.trim();
                    if (!key || !value) return;
                    this.selectedTags = this.selectedTags.filter(t => t.key !== key);
                    this.selectedTags.push({key, value});
                    this.customKey = '';
                    this.customValue = '';
                },
                removeTag(key) {
                    this.selectedTags = this.selectedTags.filter(t => t.key !== key);
                }
              }"
              x-init="
                $el.querySelectorAll('.initial-tag').forEach(el => {
                    selectedTags.push({ key: el.dataset.key, value: el.dataset.value });
                });
              ">
            <!-- Initial Tags Data -->
            <div class="hidden">
                <span th:each="entry : *{tags}" class="initial-tag" th:data-key="${entry.key}" th:data-value="${entry.value}"></span>
            </div>
            
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div th:if="${error}" class="p-3 bg-red-50 text-red-600 text-sm rounded-lg border border-red-100" th:text="${error}"></div>
            
            <div>
                <label for="name" class="block text-sm font-medium text-slate-700 mb-1" th:text="#{terminal.create.name}">Terminal Name</label>
                <div class="relative">
                    <input type="text" id="name" th:field="*{name}"
                           class="w-full px-4 py-2 border rounded-lg focus:outline-none transition-all placeholder:text-slate-400"
                           th:classappend="${#fields.hasErrors('name')} ? 'border-red-500 focus:ring-2 focus:ring-red-500/20 focus:border-red-500' : 'border-slate-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500'"
                           placeholder="e.g. Scalping-Bot-01">
                    <div th:if="${#fields.hasErrors('name')}" class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                        <i data-lucide="alert-circle" class="w-5 h-5 text-red-500"></i>
                    </div>
                </div>
                <p class="text-red-500 text-[11px] mt-1 font-medium" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
            </div>

            <div>
                <label for="platform" class="block text-sm font-medium text-slate-700 mb-1" th:text="#{terminal.create.version}">Platform</label>
                <div class="relative">
                    <select id="platform" th:field="*{platform}"
                            class="w-full px-4 py-2 border rounded-lg focus:outline-none transition-all appearance-none bg-white"
                            th:classappend="${#fields.hasErrors('platform')} ? 'border-red-500 focus:ring-2 focus:ring-red-500/20 focus:border-red-500' : 'border-slate-200 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500'">
                        <option value="" th:text="#{NotBlank.terminal.platform}">Select a platform</option>
                        <option th:each="p : ${platforms}" th:value="${p}" th:text="#{ 'platform.' + ${p} }"></option>
                    </select>
                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none gap-2">
                        <i th:if="${#fields.hasErrors('platform')}" data-lucide="alert-circle" class="w-5 h-5 text-red-500"></i>
                        <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>
                    </div>
                </div>
                <p class="text-red-500 text-[11px] mt-1 font-medium" th:if="${#fields.hasErrors('platform')}" th:errors="*{platform}"></p>
            </div>

            <!-- Tags Section -->
            <div class="pt-2">
                <label class="block text-sm font-medium text-slate-700 mb-1" th:text="#{terminal.create.section4.title}">Tags & Labels</label>
                <p class="text-xs text-slate-500 mb-3" th:text="#{terminal.create.section4.description}">Add labels to organize and filter your terminal.</p>
                
                <div class="flex flex-wrap gap-2 mb-3">
                    <template x-for="tag in selectedTags" :key="tag.key">
                        <span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-medium bg-blue-50 text-blue-700 border border-blue-100 group transition-all hover:bg-blue-100">
                            <span x-text="tag.key + ': ' + tag.value"></span>
                            <button type="button" @click="removeTag(tag.key)" class="ml-1.5 inline-flex items-center justify-center h-4 w-4 rounded-full text-blue-400 hover:bg-blue-300 hover:text-blue-600 focus:outline-none">
                                <svg class="h-2 w-2" stroke="currentColor" fill="none" viewBox="0 0 8 8">
                                    <path stroke-linecap="round" stroke-width="1.5" d="M1 1l6 6m0-6L1 7" />
                                </svg>
                            </button>
                            <input type="hidden" :name="'tags[' + tag.key + ']'" :value="tag.value">
                        </span>
                    </template>
                </div>

                <div class="flex gap-2 mb-3">
                    <input type="text" x-model="customKey" @keydown.enter.prevent="$refs.valueInput.focus()"
                           class="w-1/3 px-4 py-2 text-sm border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                           th:placeholder="#{terminal.create.section4.placeholder.key}">
                    <input type="text" x-ref="valueInput" x-model="customValue" @keydown.enter.prevent="addTag(customKey, customValue)"
                           class="flex-1 px-4 py-2 text-sm border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                           th:placeholder="#{terminal.create.section4.placeholder.value}">
                    <button type="button" @click="addTag(customKey, customValue)"
                            class="px-4 py-2 text-sm font-medium text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors border border-slate-200"
                            th:text="#{terminal.create.section4.button.add}">
                        Add
                    </button>
                </div>

                <div>
                    <p class="text-[10px] uppercase font-bold tracking-wider text-slate-400 mb-2" th:text="#{terminal.create.section4.suggested.keys}">Suggested Keys</p>
                    <div class="flex flex-wrap gap-1.5">
                        <template x-for="suggested in ['env', 'strategy', 'tier', 'cluster', 'region']" :key="suggested">
                            <button type="button" @click="customKey = suggested; $refs.valueInput.focus()"
                                    class="px-2.5 py-1 text-xs font-medium border border-slate-200 rounded-md hover:border-blue-300 hover:bg-blue-50 hover:text-blue-600 transition-all text-slate-600 bg-white"
                                    x-text="suggested">
                            </button>
                        </template>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-end space-x-3 mt-8">
                <button type="button" @click="open = false"
                        class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 rounded-lg transition-colors"
                        th:text="#{common.cancel}">Cancel</button>
                <button type="submit"
                        class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-sm transition-colors"
                        th:text="#{common.create}">Create Terminal</button>
            </div>
        </form>
    </div>
</div>

<div th:fragment="terminalTokenView">
    <div class="p-6 text-center" hx-trigger="load" hx-get="/terminals/list" hx-target="#terminals-list" hx-swap="innerHTML"
         x-data="{ copied: false }">
        <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h3 class="text-xl font-bold text-slate-800 mb-2" th:text="#{terminal.create.success.title}">Terminal Created!</h3>
        <p class="text-sm text-slate-500 mb-6" th:text="#{terminal.create.success.subtitle}">Use this bootstrap token to connect your terminal. This token is only shown once.</p>
        
        <div class="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-6 group relative">
            <code id="bootstrap-token" class="text-sm font-mono text-blue-700 break-all select-all" th:text="${terminal.bootstrapToken}">TOKEN_PLACEHOLDER</code>
            <button class="absolute top-2 right-2 p-1.5 rounded-md transition-all duration-200"
                    :class="copied ? 'bg-green-100 text-green-600' : 'text-slate-400 hover:text-blue-600 hover:bg-slate-100'"
                    @click="navigator.clipboard.writeText($el.previousElementSibling.innerText); copied = true; setTimeout(() => copied = false, 2000)">
                <div class="flex items-center space-x-1">
                    <svg x-show="!copied" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
                    </svg>
                    <svg x-show="copied" x-cloak class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                    <span x-show="copied" x-cloak class="text-xs font-bold uppercase tracking-wider" th:text="#{common.copied}">Copied</span>
                </div>
            </button>
        </div>

        <button @click="open = false"
                class="w-full px-4 py-2 text-sm font-medium text-white bg-slate-800 hover:bg-slate-900 rounded-lg shadow-sm transition-colors"
                th:text="#{common.done}">Done</button>
    </div>
</div>

</body>
</html>
