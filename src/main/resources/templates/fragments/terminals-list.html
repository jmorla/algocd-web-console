<div id="terminals-list" th:fragment="terminalsList" xmlns:th="http://www.thymeleaf.org">
  <!-- Grid View -->
  <div th:if="${not #lists.isEmpty(terminals)}" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div th:each="terminal : ${terminals}" 
         class="bg-white rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-all group flex flex-col">
      
      <!-- Card Header -->
      <div class="p-5 border-b border-slate-50 flex items-start justify-between">
        <div class="flex items-center gap-4">
          <!-- Instance Icon -->
          <div class="w-12 h-12 rounded-xl bg-slate-50 border border-slate-100 text-blue-600 flex items-center justify-center shadow-sm">
            <i data-lucide="monitor" class="w-6 h-6"></i>
          </div>
          <div>
            <h3 class="font-bold text-[#1E293B] text-lg leading-tight group-hover:text-blue-600 transition-colors" th:text="${terminal.name}">Terminal Name</h3>
            <div class="flex items-center gap-2 mt-1">
              <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75"
                      th:classappend="${terminal.status == 'RUNNING' ? 'bg-green-400' : (terminal.status == 'PROVISIONING' ? 'bg-blue-400' : 'bg-slate-400')}"></span>
                <span class="relative inline-flex rounded-full h-2 w-2"
                      th:classappend="${terminal.status == 'RUNNING' ? 'bg-green-500' : (terminal.status == 'PROVISIONING' ? 'bg-blue-500' : 'bg-slate-500')}"></span>
              </span>
              <span class="text-[11px] font-bold uppercase tracking-wider text-slate-500" 
                    th:text="${#messages.msg('terminal.status.' + terminal.status)}">RUNNING</span>
            </div>
          </div>
        </div>

        <!-- Action Menu -->
        <div x-data="{ open: false }" class="relative">
          <button @click="open = !open" @click.away="open = false" 
                  class="p-2 rounded-lg hover:bg-slate-50 text-slate-400 hover:text-slate-600 transition-colors">
            <i data-lucide="more-vertical" class="w-5 h-5"></i>
          </button>
          <div x-show="open" x-cloak
               x-transition:enter="transition ease-out duration-100"
               x-transition:enter-start="transform opacity-0 scale-95"
               x-transition:enter-end="transform opacity-100 scale-100"
               class="absolute right-0 z-50 mt-2 w-48 origin-top-right rounded-xl bg-white shadow-xl ring-1 ring-black ring-opacity-5 border border-slate-100 overflow-hidden">
            <div class="py-1">
              <a href="#" class="flex items-center gap-2 px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50">
                <i data-lucide="settings-2" class="w-4 h-4 text-slate-400"></i> Manage
              </a>
              <a href="#" class="flex items-center gap-2 px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50">
                <i data-lucide="refresh-cw" class="w-4 h-4 text-slate-400"></i> Reboot
              </a>
              <div class="border-t border-slate-100 my-1"></div>
              <a href="#" class="flex items-center gap-2 px-4 py-2.5 text-sm text-amber-600 hover:bg-amber-50">
                <i data-lucide="square" class="w-4 h-4"></i> Stop
              </a>
              <a href="#" class="flex items-center gap-2 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 font-semibold">
                <i data-lucide="trash-2" class="w-4 h-4"></i> Terminate
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Card Body -->
      <div class="p-5 space-y-4 flex-1">
        <!-- Details Grid -->
        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-1">
            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-tight">Public IP</p>
            <div class="flex items-center gap-1.5">
              <code class="text-sm font-mono text-[#1E293B]" th:text="${terminal.instanceIp != null ? terminal.instanceIp : '--'}">192.168.1.1</code>
            </div>
          </div>
          <div class="space-y-1">
            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-tight">Version</p>
            <p class="text-sm text-[#1E293B] font-medium" th:text="${#strings.capitalize(#strings.toLowerCase(terminal.version.name().replace('_', ' ')))}">Metatrader 5</p>
          </div>
        </div>

        <div class="pt-4 border-t border-slate-50 flex items-center justify-between text-xs text-slate-500">
          <div class="flex items-center gap-1.5">
            <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
            <span th:text="${#temporals.format(terminal.createdAt, 'dd MMM yyyy')}">12 Jan 2026</span>
          </div>
          <div class="font-mono text-[10px] text-slate-300" th:text="${#strings.substring(terminal.terminalId, 0, 8)}">UUID</div>
        </div>
      </div>

      <!-- Card Footer -->
      <div class="px-5 py-4 bg-slate-50/50 rounded-b-xl border-t border-slate-50">
        <a href="#" class="w-full inline-flex items-center justify-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-bold text-slate-700 hover:bg-slate-50 hover:border-slate-300 transition-all shadow-sm">
          <i data-lucide="external-link" class="w-4 h-4"></i>
          Open Console
        </a>
      </div>
    </div>
  </div>

  <!-- Pagination (Lightsail Style) -->
  <div th:if="${totalPages > 1}" class="mt-8 flex items-center justify-center gap-4">
    <button hx-get th:attr="hx-get=@{/terminals/list(page=${currentPage - 1}, size=${pageSize})}"
            hx-target="#terminals-list"
            class="flex items-center gap-2 px-4 py-2 rounded-lg border border-slate-200 text-sm font-semibold text-slate-600 hover:bg-white transition-all disabled:opacity-50"
            th:disabled="${currentPage == 1}">
      <i data-lucide="chevron-left" class="w-4 h-4"></i> Previous
    </button>
    
    <span class="text-sm font-bold text-slate-500">
      Page <span class="text-[#1E293B]" th:text="${currentPage}">1</span> of <span th:text="${totalPages}">10</span>
    </span>

    <button hx-get th:attr="hx-get=@{/terminals/list(page=${currentPage + 1}, size=${pageSize})}"
            hx-target="#terminals-list"
            class="flex items-center gap-2 px-4 py-2 rounded-lg border border-slate-200 text-sm font-semibold text-slate-600 hover:bg-white transition-all disabled:opacity-50"
            th:disabled="${currentPage >= totalPages}">
      Next <i data-lucide="chevron-right" class="w-4 h-4"></i>
    </button>
  </div>

  <!-- Empty State -->
  <div th:if="${#lists.isEmpty(terminals)}" class="flex flex-col items-center justify-center py-20 px-6">
    <div class="w-48 h-48 mb-8 relative flex items-center justify-center">
      <img src="/terminals-empty.svg" th:alt="#{terminal.empty.title}" class="w-full h-full opacity-50">
    </div>
    <h2 class="text-2xl font-bold text-[#1E293B] mb-2 text-center" th:text="#{terminal.empty.title}">No terminals found</h2>
    <p class="text-slate-500 max-w-xs text-center text-sm leading-relaxed" th:text="#{terminal.empty.description}">
      Register your first terminal using the AlgoCD Agent to see it here.
    </p>
  </div>
</div>
