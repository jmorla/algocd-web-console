<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<aside th:fragment="sidebar(activePage)" class="w-64 h-full bg-white border-r border-slate-200 flex flex-col shrink-0">
    <!-- Logo -->
    <a th:href="@{/dashboard}" class="p-6 flex items-center gap-3 cursor-pointer">
        <i data-lucide="bot" class="w-8 h-8 text-[#2563EB]"></i>
        <span class="text-xl font-bold tracking-tight text-[#1E293B]">AlgoCD</span>
    </a>

    <!-- Nav Links -->
    <nav class="flex-1 px-4 space-y-1 mt-2 overflow-y-auto">
        <a th:href="@{/dashboard}"
           th:class="${activePage == 'dashboard' ? 'flex items-center gap-3 px-3 py-2.5 text-[14px] font-semibold text-[#2563EB] bg-[#EFF6FF] rounded-lg border border-[#DBEAFE] transition-all' : 'flex items-center gap-3 px-3 py-2.5 text-[14px] font-medium text-slate-500 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-all'}">
            <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
            <span th:text="#{sidebar.nav.dashboard}">Dashboard</span>
        </a>
        <a th:href="@{/terminals}"
           th:class="${activePage == 'terminal' ? 'flex items-center gap-3 px-3 py-2.5 text-[14px] font-semibold text-[#2563EB] bg-[#EFF6FF] rounded-lg border border-[#DBEAFE] transition-all' : 'flex items-center gap-3 px-3 py-2.5 text-[14px] font-medium text-slate-500 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-all'}">
            <i data-lucide="monitor" class="w-5 h-5"></i>
            <span th:text="#{sidebar.nav.terminal}">Terminals</span>
        </a>
        <a th:href="@{/repository}"
           th:class="${activePage == 'repository' ? 'flex items-center gap-3 px-3 py-2.5 text-[14px] font-semibold text-[#2563EB] bg-[#EFF6FF] rounded-lg border border-[#DBEAFE] transition-all' : 'flex items-center gap-3 px-3 py-2.5 text-[14px] font-medium text-slate-500 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-all'}">
            <i data-lucide="package" class="w-5 h-5"></i>
            <span th:text="#{sidebar.nav.repository}">Repository</span>
        </a>
    </nav>

    <!-- User Profile Dropdown -->
    <div class="p-4 border-t border-slate-100 relative">
        <button id="profile-btn" class="flex items-center gap-3 w-full p-2 rounded-xl hover:bg-slate-50 transition-colors group text-left">
            <div class="relative">
                <img src="https://ui-avatars.com/api/?name=Jorge+Admin&background=2563EB&color=fff" class="w-9 h-9 rounded-lg border border-slate-200" alt="Avatar">
                <span class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></span>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-[13px] font-bold text-[#1E293B] truncate">Jorge Admin</p>
                <p class="text-[11px] text-slate-500 truncate" th:text="#{sidebar.profile.plan}">Pro Plan</p>
            </div>
            <i data-lucide="chevron-up" id="profile-arrow" class="w-4 h-4 text-slate-400 group-hover:text-slate-600 transition-transform"></i>
        </button>

        <!-- Dropdown Menu -->
        <div id="profile-dropdown" class="hidden absolute bottom-[calc(100%-8px)] left-4 right-4 bg-white rounded-xl border border-slate-200 shadow-xl py-1.5 z-50 mb-2">
            <a href="#" class="flex items-center gap-3 px-3 py-2 text-[13px] font-medium text-slate-600 hover:bg-slate-50 hover:text-[#1E293B] transition-colors">
                <i data-lucide="user" class="w-4 h-4 text-slate-400"></i>
                <span th:text="#{sidebar.profile.settings}">Profile Settings</span>
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2 text-[13px] font-medium text-slate-600 hover:bg-slate-50 hover:text-[#1E293B] transition-colors">
                <i data-lucide="credit-card" class="w-4 h-4 text-slate-400"></i>
                <span th:text="#{sidebar.profile.billing}">Billing & Plans</span>
            </a>
            <div class="h-px bg-slate-100 my-1 mx-2"></div>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="flex items-center gap-3 px-3 py-2 w-full text-[13px] font-bold text-red-500 hover:bg-red-50 transition-colors">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    <span th:text="#{sidebar.profile.signout}">Sign Out</span>
                </button>
            </form>
        </div>
    </div>
</aside>
</html>
