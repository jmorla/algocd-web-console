<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{error.404.title}">AlgoCD - Page Not Found</title>
    <link rel="stylesheet" href="/dist/main.css" />
  </head>
  <body>
    <div class="h-screen bg-[#F8FAFC] flex font-sans text-[#1E293B] overflow-hidden">
      <!-- Sidebar (Static) -->
      <aside th:replace="~{fragments/sidebar :: sidebar('none')}"></aside>

      <!-- Main Content (Centered Message) -->
      <main class="flex-1 h-full overflow-y-auto flex items-center justify-center p-6">
        <div class="text-center">
          <div class="w-20 h-20 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-6 text-[#2563EB]">
            <i data-lucide="file-question" class="w-10 h-10"></i>
          </div>
          <h1 class="text-6xl font-black text-[#2563EB] mb-2" th:text="#{error.404.heading}">404</h1>
          <h2 class="text-2xl font-bold text-[#1E293B] mb-4" th:text="#{error.404.subheading}">Page not found</h2>
          <p class="text-slate-500 mb-8 max-w-xs mx-auto" th:text="#{error.404.description}">
            Sorry, we couldn't find the page you're looking for.
          </p>
          <a th:href="@{/dashboard}" class="inline-flex items-center gap-2 bg-[#2563EB] text-white px-6 py-3 rounded-lg font-bold shadow-lg shadow-blue-200 hover:bg-[#1D4ED8] transition-all active:scale-[0.98]">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
            <span th:text="#{error.404.back_button}">Back to Dashboard</span>
          </a>
        </div>
      </main>
    </div>
    <script type="module" src="/dist/main.js"></script>
  </body>
</html>
