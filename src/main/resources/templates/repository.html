<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{repository.title}">AlgoCD - Repository</title>
    <link rel="stylesheet" href="/dist/main.css" />
  </head>
  <body>
    <div class="h-screen bg-[#F8FAFC] flex font-sans text-[#1E293B] overflow-hidden">
      <!-- Sidebar (Static) -->
      <aside th:replace="~{fragments/sidebar :: sidebar('repository')}"></aside>

      <!-- Main Content (Scrollable) -->
      <main class="flex-1 h-full overflow-y-auto px-48 pt-8 pb-12">
        <!-- Header -->
        <header class="flex items-center justify-between mb-6">
          <div>
            <h1 class="text-2xl font-bold text-[#1E293B]" th:text="#{repository.header.title}">Repository</h1>
            <p class="text-slate-500 text-sm" th:text="#{repository.header.subtitle}">Manage your trading experts and market indicators in one place.</p>
          </div>
          <div class="flex items-center gap-3">
            <a href="/upload-experts.html" class="flex items-center gap-2 bg-[#2563EB] text-white px-5 py-2.5 rounded-lg font-semibold text-sm shadow-sm hover:bg-[#1D4ED8] transition-colors">
              <i data-lucide="upload" class="w-4 h-4"></i>
              <span th:text="#{repository.header.button.upload}">Upload Experts</span>
            </a>
          </div>
        </header>

        <!-- Tabs -->
        <div class="flex items-center gap-8 border-b border-slate-200 mb-6">
          <button id="tab-experts" class="px-1 py-2.5 text-sm font-bold text-[#2563EB] border-b-2 border-[#2563EB] transition-all" th:text="#{repository.tabs.experts}">
            Expert Advisors
          </button>
          <button id="tab-indicators" class="px-1 py-2.5 text-sm font-medium text-slate-500 hover:text-slate-700 transition-all border-b-2 border-transparent" th:text="#{repository.tabs.indicators}">
            Indicators
          </button>
        </div>
        
        <!-- Expert Advisors Content -->
        <div id="content-experts" class="block">
          <div th:replace="~{fragments/artifacts-list :: artifactsList(${experts}, 'EXPERT', ${expertPage}, ${totalExpertPages}, ${totalExperts}, ${pageSize})}"></div>
        </div>

        <!-- Indicators Content -->
        <div id="content-indicators" class="hidden">
          <div th:replace="~{fragments/artifacts-list :: artifactsList(${indicators}, 'INDICATOR', ${indicatorPage}, ${totalIndicatorPages}, ${totalIndicators}, ${pageSize})}"></div>
        </div>
      </main>
    </div>
    <script type="module" src="/dist/main.js"></script>
    <script>
      const tabExperts = document.getElementById('tab-experts');
      const tabIndicators = document.getElementById('tab-indicators');
      const contentExperts = document.getElementById('content-experts');
      const contentIndicators = document.getElementById('content-indicators');

      const showExperts = () => {
        tabExperts.classList.add('text-[#2563EB]', 'border-[#2563EB]');
        tabExperts.classList.remove('text-slate-500', 'border-transparent');
        tabIndicators.classList.remove('text-[#2563EB]', 'border-[#2563EB]');
        tabIndicators.classList.add('text-slate-500', 'border-transparent');
        
        contentExperts.classList.remove('hidden');
        contentIndicators.classList.add('hidden');
      };

      const showIndicators = () => {
        tabIndicators.classList.add('text-[#2563EB]', 'border-[#2563EB]');
        tabIndicators.classList.remove('text-slate-500', 'border-transparent');
        tabExperts.classList.remove('text-[#2563EB]', 'border-[#2563EB]');
        tabExperts.classList.add('text-slate-500', 'border-transparent');
        
        contentIndicators.classList.remove('hidden');
        contentExperts.classList.add('hidden');
      };

      tabExperts.addEventListener('click', showExperts);
      tabIndicators.addEventListener('click', showIndicators);

      // Handle initial tab from URL
      const urlParams = new URLSearchParams(window.location.search);
      const activeTab = urlParams.get('tab');
      if (activeTab === 'indicators') {
        showIndicators();
      } else {
        showExperts();
      }
    </script>
  </body>
</html>
